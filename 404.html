<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Shake-o-mat</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#050816;--blue:#1ba2ff;--cyan:#73edff;--muted:#8aa0c8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:#f4f8ff;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
  h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(80px,15vw,160px);font-weight:900;color:var(--blue);line-height:1;}
  h2{font-family:'Barlow Condensed',sans-serif;font-size:clamp(24px,4vw,40px);font-weight:900;text-transform:uppercase;margin:16px 0 8px;}
  p{color:var(--muted);max-width:40ch;margin:0 auto 32px;}
  a{display:inline-block;padding:14px 32px;border-radius:999px;background:linear-gradient(135deg,var(--cyan),var(--blue));color:#020a1a;font-weight:800;text-decoration:none;font-size:15px;letter-spacing:.06em;text-transform:uppercase;}
</style>
</head>
<body>
  <h1>404</h1>
  <h2>Stranica nije pronađena</h2>
  <p>Ova stranica ne postoji. Možda si tražio automat za protein?</p>
  <a href="/">Nazad na početnu →</a>
</body>
</html>
